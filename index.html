<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastrobau</title>
    <link rel="stylesheet" href="/src/output.css">
    <link rel="shortcut icon" href="/pictures/svg/favicon.svg" type="image/x-icon">
</head>

<body>
    <header class="max-w-full h-24 flex justify-center-safe">
        <div alt="nav" class="bg-stone-300 w-full h-full flex justify-center-safe">
            <div alt="logo" class="size-40 mt-3.5"><img src="/pictures/svg/logo.svg">
            </div>
    </header>
    <div alt="content" class="max-w-64 mx-auto justify-center-safe flex flex-col gap-2 mt-7 mb-7 text-white">
        <a class="bg-[url(/pictures/services.png)] bg-cover bg-center bg-no-repeat group relative opacity-80 hover:opacity-100 w-full h-64 flex justify-center-safe items-center transition duration-400"
            href="/pages/services/services.html">
            <div class="m-auto flex flex-col items-center gap-2">
                <img src="/pictures/svg/custom.wrench.and.screwdriver.fill.svg"
                    class="size-25 opacity-100 lg:group-hover:opacity-0 transition duration-400">
                <p class="text-sm font-medium tracking-wide text-white lg:hidden">Servizi</p>
            </div>
            <span
                class="hidden lg:flex absolute inset-0 items-center justify-center text-lg font-semibold text-white opacity-0 group-hover:opacity-100 transition duration-400">
                Servizi
            </span>
        </a>
        <a class="bg-[url(/pictures/jobs.png)] bg-cover bg-center bg-no-repeat group relative opacity-80 hover:opacity-100 w-full h-64 flex justify-center-safe items-center transition duration-400"
            href="/pages/completed/jobs.html">
            <div class="m-auto flex flex-col items-center gap-2">
                <img src="/pictures/svg/customhouse.svg"
                    class="size-25 opacity-100 lg:group-hover:opacity-0 transition duration-400">
                <p class="text-sm font-medium tracking-wide text-white lg:hidden">Lavori svolti</p>
            </div>
            <span
                class="hidden lg:flex absolute inset-0 items-center justify-center text-lg font-semibold text-white opacity-0 group-hover:opacity-100 transition duration-400">
                Lavori svolti
            </span>
        </a>
        <a class="bg-[url(/pictures/AI_man.png)] bg-cover bg-center bg-no-repeat group relative opacity-80 hover:opacity-100 w-full h-64 flex justify-center-safe items-center transition duration-400"
            href="/pages/myself/myself.html">
            <div class="m-auto flex flex-col items-center gap-2">
                <img src="/pictures/svg/custom.person.fill.svg"
                    class="size-25 opacity-100 lg:group-hover:opacity-0 transition duration-400">
                <p class="text-sm font-medium tracking-wide text-white lg:hidden">La mia persona</p>
            </div>
            <span
                class="hidden lg:flex absolute inset-0 items-center justify-center text-lg font-semibold text-white opacity-0 group-hover:opacity-100 transition duration-400">
                La mia persona
            </span>
        </a>
    </div>
    <footer class="max-w-full h-24">
        <div alt="footer" class="bg-stone-300 w-full h-full">
            <div alt="unordered-list" class="max-w-full max-h-full flex justify-center align-middle">
                <ul class="my-3">
                    <li>Impressum</li>
                    <li>Rechtliches</li>
                    <li>Weiteres</li>
                </ul>
            </div>
        </div>
    </footer>
</body>

</html>
