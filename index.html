<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastrobau</title>
    <link rel="stylesheet" href="/src/output.css">
    <link rel="shortcut icon" href="./pictures/svg/favicon.svg" type="image/x-icon">
</head>

<body>
    <header class="max-w-full h-24 flex justify-center-safe">
        <div alt="nav" class="bg-stone-300 w-full h-full flex justify-center-safe">
             <div alt="logo" class="size-40 mt-3.5"><img src="./pictures/svg/logo.svg">
        </div>
    </header>
    <div alt="content" class="max-w-64 mx-auto justify-center-safe flex flex-col gap-2 mt-7 mb-7 text-white">
        <a class="bg-[url(/pictures/services.png)] bg-contain group opacity-80 hover:opacity-100 w-full h-64 flex justify-center-safe transition duration-400"
            href="./pages/services/services.html">
            <img src="./pictures/svg/custom.wrench.and.screwdriver.fill.svg"
                class="size-25 m-auto opacity-100 group-hover:opacity-0 transition duration-400">
            <div>
                <p class="opacity-0 hover:opacity-100">Hello</p>
            </div>
        </a>
        <a class="bg-[url(/pictures/jobs.png)] group bg-no-repeat bg-cover opacity-80 hover:opacity-100 w-full h-64 flex justify-center-safe transition duration-400"
            href="./pages/completed/jobs.html">
            <img src="./pictures/svg/customhouse.svg"
                class="size-25 m-auto opacity-100 group-hover:opacity-0 transition duration-400">
        </a>
        <a class="bg-[url(/pictures/AI_man.png)] group bg-no-repeat bg-cover opacity-80 hover:opacity-120 w-full h-64 flex justify-center-safe transition duration-400"
            href="./pages/myself/myself.html">
            <img src="./pictures/svg/custom.person.fill.svg"
                class="size-25 opacity-100 group-hover:opacity-0 m-auto transition duration-400">
        </a>
    </div>
    <footer class="max-w-full h-24">
        <div alt="footer" class="bg-stone-300 w-full h-full">
            <div alt="unordered-list" class="max-w-full max-h-full flex justify-center align-middle">
                <ul class="my-3">
                    <li>Impressum</li>
                    <li>Rechtliches</li>
                    <li>Weiteres</li>
                </ul>
            </div>
        </div>
    </footer>
</body>

</html>
